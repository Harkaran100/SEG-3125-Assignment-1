<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Symbol Recall — Flip and match emoji cards. Choose your difficulty and theme. Built for SEG3125 by Harkaran Rangi." />
  <title>Symbol Recall — Memory Game | Harkaran Rangi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    /* ── Card flip ── */
    .memory-card { perspective: 800px; cursor: pointer; min-height: 70px; }
    .card-inner {
      position: relative; width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.38s ease;
    }
    .memory-card.flipped .card-inner,
    .memory-card.matched .card-inner { transform: rotateY(180deg); }
    .card-back, .card-front {
      position: absolute; inset: 0;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 0.75rem;
      display: flex; align-items: center; justify-content: center;
    }
    .card-back {
      background: #1e293b; border: 2px solid #334155;
    }
    .card-back-symbol { color: #475569; font-size: 1.25rem; user-select: none; }
    .card-front {
      background: #1e293b; border: 2px solid #10b981;
      transform: rotateY(180deg);
    }
    .card-emoji { font-size: clamp(1.1rem, 3.5vw, 2rem); user-select: none; }
    .memory-card.matched { pointer-events: none; }
    .memory-card.matched .card-front {
      background: #064e3b;
      border-color: #10b981;
      box-shadow: 0 0 14px rgba(16,185,129,0.35);
    }
    .memory-card:not(.flipped):not(.matched):hover .card-back {
      border-color: #10b981; background: #243447;
    }

    /* ── Option button selected states ── */
    [data-difficulty].is-selected {
      background-color: #10b981 !important; color: #fff !important;
      border-color: #10b981 !important;
    }
    [data-theme].is-selected {
      border-color: #10b981 !important;
      box-shadow: 0 0 0 2px #10b981;
      background-color: #0d2d22 !important;
    }

    /* ── HUD monospace ── */
    .mono { font-family: ui-monospace, 'Cascadia Code', 'Courier New', monospace; }
  </style>
</head>
<body class="bg-slate-900 text-white font-sans antialiased min-h-screen flex flex-col">

  <!-- ── Header ── -->
  <header class="bg-slate-900/95 backdrop-blur-sm border-b border-slate-800 sticky top-0 z-50">
    <div class="mx-auto max-w-4xl px-6 h-14 flex items-center justify-between">
      <a href="index.html" class="inline-flex items-center gap-2 text-sm font-medium text-slate-400 hover:text-emerald-400 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
        Back to Portfolio
      </a>
      <span class="text-sm font-semibold text-emerald-400 tracking-wide">SYMBOL RECALL</span>
    </div>
  </header>

  <main class="flex-1">

    <!-- ══════════════════════════════════════════════
         SCREEN 1 — SETUP
    ══════════════════════════════════════════════ -->
    <div id="screen-setup" class="flex items-center justify-center min-h-[calc(100vh-3.5rem)] px-4 py-10">
      <div class="w-full max-w-md">

        <!-- Title -->
        <div class="text-center mb-8">
          <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-emerald-900/50">
            <span class="text-3xl" aria-hidden="true">🃏</span>
          </div>
          <h1 class="text-3xl sm:text-4xl font-extrabold text-white mb-1">Symbol Recall</h1>
          <p class="text-slate-400 text-sm">Flip, match, remember!</p>
        </div>

        <!-- Difficulty -->
        <div class="mb-6">
          <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Difficulty</p>
          <div class="grid grid-cols-3 gap-2">
            <button data-difficulty="easy"
              class="py-3 px-2 rounded-xl border border-slate-600 bg-slate-800 text-slate-300 text-sm font-semibold hover:border-emerald-500 hover:text-emerald-400 transition-all duration-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500">
              Easy<br><span class="text-xs font-normal opacity-70">6 pairs</span>
            </button>
            <button data-difficulty="medium"
              class="py-3 px-2 rounded-xl border border-slate-600 bg-slate-800 text-slate-300 text-sm font-semibold hover:border-emerald-500 hover:text-emerald-400 transition-all duration-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500">
              Medium<br><span class="text-xs font-normal opacity-70">8 pairs</span>
            </button>
            <button data-difficulty="hard"
              class="py-3 px-2 rounded-xl border border-slate-600 bg-slate-800 text-slate-300 text-sm font-semibold hover:border-emerald-500 hover:text-emerald-400 transition-all duration-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500">
              Hard<br><span class="text-xs font-normal opacity-70">15 pairs</span>
            </button>
          </div>
        </div>

        <!-- Theme -->
        <div class="mb-6">
          <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Theme</p>
          <div class="grid grid-cols-3 gap-2">
            <button data-theme="animals"
              class="py-4 px-2 rounded-xl border border-slate-600 bg-slate-800 text-slate-300 text-sm font-semibold hover:border-emerald-500 transition-all duration-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500 flex flex-col items-center gap-1.5">
              <span class="text-2xl" aria-hidden="true">🐾</span>
              <span>Animals</span>
              <span class="text-xs font-normal text-slate-500">Critters</span>
            </button>
            <button data-theme="space"
              class="py-4 px-2 rounded-xl border border-slate-600 bg-slate-800 text-slate-300 text-sm font-semibold hover:border-emerald-500 transition-all duration-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500 flex flex-col items-center gap-1.5">
              <span class="text-2xl" aria-hidden="true">🚀</span>
              <span>Space</span>
              <span class="text-xs font-normal text-slate-500">Stars & planets</span>
            </button>
            <button data-theme="food"
              class="py-4 px-2 rounded-xl border border-slate-600 bg-slate-800 text-slate-300 text-sm font-semibold hover:border-emerald-500 transition-all duration-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500 flex flex-col items-center gap-1.5">
              <span class="text-2xl" aria-hidden="true">🍕</span>
              <span>Food</span>
              <span class="text-xs font-normal text-slate-500">Tasty treats</span>
            </button>
          </div>
        </div>

        <!-- Summary chip -->
        <div class="flex justify-center mb-6">
          <span id="setup-summary" class="px-4 py-1.5 bg-slate-800 border border-slate-700 rounded-full text-slate-400 text-sm"></span>
        </div>

        <!-- Start button -->
        <button id="btn-start"
          class="w-full py-4 bg-emerald-500 hover:bg-emerald-400 text-white text-base font-bold rounded-xl transition-all duration-200 shadow-lg shadow-emerald-900/40 hover:-translate-y-0.5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-400">
          Start Game ✨
        </button>
        <p class="text-center text-slate-600 text-xs mt-3">Take your time — no rush!</p>

      </div>
    </div>

    <!-- ══════════════════════════════════════════════
         SCREEN 2 — GAME
    ══════════════════════════════════════════════ -->
    <div id="screen-game" class="hidden flex flex-col min-h-[calc(100vh-3.5rem)]">

      <!-- HUD -->
      <div class="bg-slate-800 border-b border-slate-700 px-4 py-3 sticky top-14 z-40">
        <div class="mx-auto max-w-2xl flex items-center justify-between gap-4">
          <div class="flex gap-6">
            <div class="text-center">
              <div class="mono text-xl font-bold text-white" id="hud-moves">0</div>
              <div class="text-slate-500 text-xs uppercase tracking-wider">Moves</div>
            </div>
            <div class="text-center">
              <div class="mono text-xl font-bold text-emerald-400" id="hud-time">0:00</div>
              <div class="text-slate-500 text-xs uppercase tracking-wider">Time</div>
            </div>
            <div class="text-center">
              <div class="mono text-xl font-bold text-white" id="hud-pairs">0/0</div>
              <div class="text-slate-500 text-xs uppercase tracking-wider">Pairs</div>
            </div>
          </div>
          <button id="btn-quit"
            class="px-4 py-1.5 text-sm font-semibold text-slate-400 border border-slate-600 rounded-lg hover:border-red-500 hover:text-red-400 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-red-500">
            Quit
          </button>
        </div>
      </div>

      <!-- Card grid -->
      <div class="flex-1 flex items-start justify-center px-4 py-6 sm:py-8">
        <div id="card-grid" class="grid gap-2 w-full max-w-2xl"></div>
      </div>

    </div>

    <!-- ══════════════════════════════════════════════
         SCREEN 3 — COMPLETE
    ══════════════════════════════════════════════ -->
    <div id="screen-complete" class="hidden flex items-center justify-center min-h-[calc(100vh-3.5rem)] px-4 py-10">
      <div class="w-full max-w-sm text-center">

        <!-- Trophy -->
        <div class="text-7xl mb-4" aria-hidden="true">🏆</div>
        <h2 class="text-3xl font-extrabold text-white mb-1">You did it!</h2>
        <p id="result-rating" class="text-emerald-400 font-semibold text-sm mb-5"></p>

        <!-- Stars -->
        <div id="result-stars" class="flex justify-center gap-2 mb-7"></div>

        <!-- Stats -->
        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-5 mb-6">
          <div class="grid grid-cols-3 gap-4 text-center">
            <div>
              <div class="mono text-xl font-bold text-white" id="result-time">—</div>
              <div class="text-slate-500 text-xs mt-1">Time</div>
            </div>
            <div>
              <div class="mono text-xl font-bold text-white" id="result-moves">—</div>
              <div class="text-slate-500 text-xs mt-1">Moves</div>
            </div>
            <div>
              <div class="mono text-xl font-bold text-emerald-400" id="result-pairs">—</div>
              <div class="text-slate-500 text-xs mt-1">Pairs</div>
            </div>
          </div>
        </div>

        <!-- Buttons -->
        <div class="flex flex-col gap-3">
          <button id="btn-play-again"
            class="w-full py-3.5 bg-emerald-500 hover:bg-emerald-400 text-white font-bold rounded-xl transition-all duration-200 shadow-lg shadow-emerald-900/40 hover:-translate-y-0.5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-400">
            🎮 Play Again
          </button>
          <button id="btn-change-settings"
            class="w-full py-3.5 border border-slate-600 text-slate-300 font-semibold rounded-xl hover:border-emerald-500 hover:text-emerald-400 transition-all duration-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500">
            ⚙️ Change Settings
          </button>
        </div>

      </div>
    </div>

  </main>

  <!-- ── Footer ── -->
  <footer class="bg-slate-900 border-t border-slate-800 text-slate-500 py-5">
    <div class="text-center text-xs">
      <p>© <span id="footer-year"></span> Symbol Recall · Designed by
        <a href="index.html" class="text-emerald-500 hover:text-emerald-400 transition-colors">Harkaran Rangi</a>
        · SEG3125
      </p>
    </div>
  </footer>

  <script type="module" src="/src/memory-game.ts"></script>
</body>
</html>
